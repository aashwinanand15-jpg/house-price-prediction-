name: ML CI/CD Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    ml-pipelines:
        runs-on: ubuntu=latest

        steps:
            # Step 1 : Checkout the repository
            - name: Checkout repository
              uses: actions/checkout@v4


            # Step 2 : Set up Python environment
            - name: Set up Python
              uses: actions/setup-python@v5
              
              with: 
                python-version: '3.10'

            # Step 3 : Install dependencies and run tests
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # Step 4 : Run unit tests
            - name: Run Unit tests
              run: 
                export PYTHONPATH=$PYTHONPATH:.
                pytest -v

            # Step 5 : Train the model
            - name: Train Model
              run: python src/train.py

            # Step 6 : Evaluate Model
            - name: Evaluate Model
              run: python src/evaluate.py

            # Step 7 : Upload Model Artifact
            - name: Upload Model Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: trained-model
                  path: models/model.pkl
            
            # Step 8 : Notify on Completion
            - name: Notify on Completion
              run: echo "ML Pipeline execution completed successfully."

    deploy:
        needs: ml-pipelines
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download trained model artifact
              uses: actions/download-artifact@v4
              with:
                name: trained-model
                path: models/

            - name: Create deployment package
              run: |
                zip -r deployment.zip application.py app.py requirements.txt src/ data/ models/ templates/ static/

            - name: Deploy to Elastic Beanstalk
              uses: einaregilsson/beanstalk-deploy@v22
              with:
                aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                application_name: house-price-predictor
                environment_name: HousePricePredictor-env
                version_label: "v${{ github.run_number }}"
                region: ${{ secrets.AWS_REGION }}
                deployment_package: deployment.zip
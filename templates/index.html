<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>House Price Predictor</h1>
            <p>Enter the properties below to get an estimated market value.</p>
        </header>

        <form id="prediction-form">
            <div class="form-group">
                <label for="area">Area (sq ft)</label>
                <input type="number" id="area" name="area" placeholder="e.g., 1500" required>
            </div>
            
            <div class="form-group">
                <label for="bedrooms">Bedrooms</label>
                <input type="number" id="bedrooms" name="bedrooms" placeholder="e.g., 3" required>
            </div>
            
            <div class="form-group">
                <label for="age">House Age (years)</label>
                <input type="number" id="age" name="age" placeholder="e.g., 10" required>
            </div>
            
            <button type="submit" id="submit-btn">
                <span class="btn-text">Predict Price</span>
                <div class="loader" id="loader" style="display: none;"></div>
            </button>
        </form>

        <div id="result-container" class="result-container hidden">
            <h3>Estimated Price</h3>
            <div id="price-result" class="price-value">$0</div>
            <p id="error-message" class="error-message hidden"></p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
